name: Package Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  package-check:
    name: Package check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate ecosystem
        run: npm test

      - name: Run doctor
        run: npm run doctor

      - name: Dry-run package
        run: npm pack --dry-run
