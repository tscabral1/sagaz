name: Package Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  package-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify package
        run: npm test

      - name: Dry-run package
        run: npm pack --dry-run
